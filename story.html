<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>耶稣的故事 | Story of Jesus</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: url('jesus.jpg') center/cover no-repeat;
}

/* 黑色遮罩 */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* 内容 */
.container {
  position: relative;
  z-index: 2;
  max-width: 800px;
  margin: auto;
  padding: 100px 20px;
  text-align: center;
}

/* 标题 */
.title {
  font-size: 42px;
  color: #ff4d4d;
  margin-bottom: 20px;
}

/* 副标题 */
.subtitle {
  font-size: 18px;
  color: #ccc;
}

/* 按钮 */
.btn {
  margin-top: 40px;
  padding: 15px 45px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg, #00c6ff, #007bff);
  color: white;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(0,123,255,0.8);
  transition: all 0.3s ease;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px rgba(0,123,255,1);
}

/* 故事 */
.block {
  margin: 40px 0;
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.block.show {
  opacity: 1;
  transform: translateY(0);
}

.zh {
  font-size: 20px;
}

.en {
  font-size: 16px;
  color: #ccc;
}
</head>
<body>

<div style="position: fixed; top: 20px; right: 20px;">
  <button onclick="setLang('zh')">中文</button>
  <button onclick="setLang('en')">English</button>
</div>

<div class="overlay"></div>
<div class="container">

  <!-- 标题 -->
  <div class="title">耶稣的故事 ✝️</div>
  <div class="subtitle">Story of Jesus</div>

 <div class="btn" onclick="window.location.href='>
   Enter
</div>
  <!-- 故事 -->
  <div id="story" >

    <div class="story">

  <p>很久以前，在伯利恒，有一个婴孩诞生，他的名字叫耶稣。</p>

  <p>他带来了爱、希望与光明，医治病人，安慰伤心的人。</p>

  <p>他教导人们彼此相爱，饶恕别人，心存善良。</p>

  <p>但他最终被钉在十字架上，为世人的罪献上自己。</p>

  <p>三天后，他从死里复活，战胜了死亡。</p>

  <p>他的爱直到今天仍然存在。</p>

</div>

<div style="position: fixed; top: 20px; left: 20px; z-index: 999;">
  <button 
    onclick="window.location.href='index.html'"
    style="
      padding: 10px 18px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(45deg, #00c6ff, #007bff);
      color: white;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0,123,255,0.6);
    "
  >
    ⬅️ 返回首页 / Home
  </button>
</div>
<script>
function setLang(lang) {
  document.querySelectorAll('.zh').forEach(el => {
    el.style.display = (lang === 'zh') ? 'block' : 'none';
  });

  document.querySelectorAll('.en').forEach(el => {
    el.style.display = (lang === 'en') ? 'block' : 'none';
  });
}

// 默认chinese
setLang('zh');
</script>
