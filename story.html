<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birth of Jesus</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: linear-gradient(to bottom, #000000, #1a1a2e);
  overflow: hidden;
}

/* 星空动画 */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://i.imgur.com/9Qx6Z5L.png");
  animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
  from { background-position: 0 0; }
  to { background-position: 1000px 1000px; }
}

/* 内容卡片 */
.card {
  position: relative;
  top: 15%;
  margin: auto;
  width: 70%;
  padding: 30px;
  background: rgba(0,0,0,0.6);
  border-radius: 20px;
}

/* 发光标题 */
.title {
  font-size: 40px;
  font-weight: 800;
  text-shadow: 
    0 0 10px #fff,
    0 0 20px gold,
    0 0 40px gold;
}

/* 文字动画 */
.fade {
  opacity: 0;
  animation: fadeIn 3s forwards;
}

.fade:nth-child(2) { animation-delay: 1s; }
.fade:nth-child(3) { animation-delay: 3s; }
.fade:nth-child(4) { animation-delay: 5s; }
.fade:nth-child(5) { animation-delay: 7s; }

@keyframes fadeIn {
  to { opacity: 1; }
}

/* 按钮 */
button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #00aaff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="card">
  <h1 class="title">The Birth of Jesus</h1>

  <p class="fade">In those days, Caesar Augustus issued a decree...</p>
  <p class="fade">Joseph went up from Nazareth to Bethlehem...</p>
  <p class="fade">And Mary gave birth to her firstborn son.</p>
  <p class="fade">She wrapped him in cloths and placed him in a manger.</p>
  <p class="fade">And the angels said: "Glory to God in the highest."</p>

  <button onclick="goHome()">Back</button>
</div>

<script>
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
