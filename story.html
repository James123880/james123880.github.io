<h1>耶稣的生平</h1>
<h2>The Life of Jesus</h2>

<p>
耶稣降生在伯利恒。<br>
Jesus was born in Bethlehem.<br><br>

他传讲爱与真理。<br>
He preached love and truth.<br><br>

他医治病人，帮助穷人。<br>
He healed the sick and helped the poor.<br><br>

他被钉十字架。<br>
He was crucified on the cross.<br><br>

第三天复活。<br>
He rose again on the third day.<br><br>

耶稣的爱直到永远。<br>
Jesus' love lasts forever.
