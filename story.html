<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;

  height: 100vh;
  text-align: center;
}

.container {
  background: rgba(0,0,0,0.4);
  padding: 30px;
  border-radius: 15px;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  background: #0077b6;
  color: white;
  cursor: pointer;
}
</style>
button:hover {
  background: #005f8a;
}</style>
</head>
<body>    
<div style="position:absolute; top:20px; right:20px;">
  <button onclick="setLang('zh')">中文</button>
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('fr')">Français</button>
</div>

<div class="container">
  <h1 id="title"></h1>
  <p id="p1"></p>
  <p id="p2"></p>
  <p id="p3"></p>

  <button id="btn1"></button>
  <br><br>
  <button id="btn2"></button>
</div>

<script>
function setLang(lang) {
  if (lang === 'zh') {
    title.innerText = "神爱你 ❤️";
    p1.innerText = "耶稣来到世上，医治病人...";
    p2.innerText = "他说：神爱世人。";
    p3.innerText = "他为我们的罪被钉十字架...";
    btn1.innerText = "🙏 我愿意相信";
    btn2.innerText = "返回首页";
  }

  if (lang === 'en') {
    title.innerText = "God Loves You ❤️";
    p1.innerText = "Jesus came to the world...";
    p2.innerText = "He said: God loves the world.";
    p3.innerText = "He died for our sins...";
    btn1.innerText = "🙏 Pray";
    btn2.innerText = "Back Home";
  }

  if (lang === 'fr') {
    title.innerText = "Dieu t'aime ❤️";
    p1.innerText = "Jésus est venu...";
    p2.innerText = "Il a dit : Dieu aime le monde.";
    p3.innerText = "Il est mort pour nos péchés...";
    btn1.innerText = "🙏 Prier";
    btn2.innerText = "Accueil";
  }
}

setLang('zh');
</script>

</body>
</html>
