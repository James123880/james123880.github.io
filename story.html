<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Story</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('jesus.jpg') no-repeat center center/cover;
  color: white;
  text-align: center;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.container {
  position: relative;
  padding-top: 100px;
}

.btn {
  padding: 10px 20px;
  background: #007bff;
  border-radius: 20px;
  cursor: pointer;
}

.block {
  margin: 20px;
}

.zh { font-size: 20px; }
.en { font-size: 16px; color: #ccc; }

.lang {
  position: fixed;
  top: 20px;
  right: 20px;
}
</style>
</head>

<body>

<div class="lang">
  <button onclick="setLang('zh')">中文</button>
  <button onclick="setLang('en')">English</button>
</div>

<div class="overlay"></div>

<div class="container">

  <h1 class="zh">耶稣的故事</h1>
  <h1 class="en">Story of Jesus</h1>

  <div class="btn" onclick="showStory()">进入 / Enter</div>

  <!-- 👇 故事（唯一一个） -->
  <div id="story" style="display:none;">

    <div class="block">
      <div class="zh">耶稣出生在伯利恒，这是一个谦卑的开始。</div>
      <div class="en">Jesus was born in Bethlehem, a humble beginning.</div>
    </div>

    <div class="block">
      <div class="zh">他带来了爱、希望与光明。</div>
      <div class="en">He brought love, hope and light.</div>
    </div>

    <div class="block">
      <div class="zh">他教导人彼此相爱。</div>
      <div class="en">He taught people to love one another.</div>
    </div>

  </div>

</div>

<script>
function showStory() {
  document.getElementById("story").style.display = "block";
}

function setLang(lang) {
  const zh = document.querySelectorAll('.zh');
  const en = document.querySelectorAll('.en');

  if (lang === 'zh') {
    zh.forEach(el => el.style.display = 'block');
    en.forEach(el => el.style.display = 'none');
  } else {
    zh.forEach(el => el.style.display = 'none');
    en.forEach(el => el.style.display = 'block');
  }
}

setLang('zh');
</script>

</body>
</html>
