<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Bible Website</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  background: url("jesus.jpg") no-repeat center center;
  background-size: cover;
}

/* overlay */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  z-index: -1;
}

/* container */
.container {
  margin-top: 120px;
}

/* title glow */
h1 {
  font-size: 40px;
  text-shadow:
    0 0 5px #fff,
    0 0 10px #00aaff,
    0 0 20px #00aaff;
}

/* buttons */
button {
  display: block;
  margin: 20px auto;
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #00aaff;
  color: white;
  cursor: pointer;
  width: 220px;
}

button:hover {
  background: #0088cc;
}
</style>
</head>

<body>

<div class="container">
  <h1>My Bible Website</h1>

  <button onclick="goPrayer()">The Lord’s Prayer</button>
  <button onclick="goMatthew()">Matthew Chapter 1</button>
</div>

<script>
function goPrayer() {
  window.location.href = "prayer.html";
}

function goMatthew() {
  window.location.href = "matthew.html";
}
</script>

</body>
</html>
