<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>敬拜模式 Worship</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: url('jesus.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-family: Arial;
}

/* 黑色渐变遮罩（电影感） */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* 中间内容 */
.container {
  position: relative;
  text-align: center;
}

/* 按钮 */
.btn {
  margin-top: 20px;
  padding: 15px 40px;
  font-size: 18px;
  background: linear-gradient(45deg, #00c6ff, #007bff);
  border-radius: 50px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px rgba(0,123,255,0.8);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h1>🙏 敬拜模式</h1>
  <div class="btn" onclick="startWorship()">进入敬拜</div>
</div>

<!-- 🎵 音乐 -->
<audio id="music" loop autoplay muted>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
let started = false;

function startWorship() {
  if (started) return;

  const music = document.getElementById("music");

  music.muted = false;
  music.volume = 0;
  music.play();

  // 🔥 音量渐入
  let vol = 0;
  let fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 100);

  started = true;
}
</script>

</body>
</html>
