<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Jesus Website</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('jesus.jpg') no-repeat center center/cover;
  color: white;
  text-align: center;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.container {
  position: relative;
  top: 30%;
}

/* 标题 */
.title {
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 20px;
  color: #ccc;
  margin-bottom: 30px;
}

/* 按钮 */
.btn {
  padding: 15px 30px;
  font-size: 18px;
  background: linear-gradient(45deg, #00c6ff, #007bff);
  border-radius: 30px;
  cursor: pointer;
  display: inline-block;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px rgba(0,123,255,0.8);
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

  <div class="title">耶稣的故事 ✝️</div>
  <div class="subtitle">Story of Jesus</div>

  <div class="btn" onclick="enter()">进入 / Enter</div>

</div>

<script>
function enter() {
  window.location.href = "story.html";
}
</script>

</body>
</html>
