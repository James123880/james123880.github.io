<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Story of Jesus</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial;
  color: white;
  text-align: center;

  /* 背景图 */
  background-image: url("jesus.jpg");
  background-size: cover;
  background-position: center;
}

/* 黑色遮罩（让文字更清楚） */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

h1 {
  margin-top: 100px;
  font-size: 48px;
}

#subtitle {
  margin-top: 30px;
  font-size: 24px;
}
</style>

</head>
<body>

<h1>The Story of Jesus</h1>

<div id="subtitle">Loading...</div>

<!-- 音乐 -->
<audio id="audio" autoplay controls>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const subtitle = document.getElementById("subtitle");

const subtitles = [
  { time: 0, text: "In the beginning, there was hope..." },
  { time: 5, text: "A light came into the world..." },
  { time: 10, text: "His name was Jesus..." },
  { time: 15, text: "He brought love and salvation..." },
  { time: 20, text: "The cross shines in the night..." },
  { time: 25, text: "And hope lives forever..." }
];

audio.addEventListener("timeupdate", () => {
  const t = audio.currentTime;

  subtitles.forEach((s, i) => {
    if (t >= s.time && (!subtitles[i + 1] || t < subtitles[i + 1].time)) {
      subtitle.innerText = s.text;
    }
  });
});
</script>

</body>
</html>
