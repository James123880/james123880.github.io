<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>God Loves You</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url('jesus.jpg') center/cover no-repeat;
}

/* 黑色电影遮罩 */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(5px);
}

/* 内容卡片 */
.container {
    position: relative;
    text-align: center;
    padding: 40px;
    border-radius: 20px;
    background: rgba(0,0,0,0.4);
    animation: fadeIn 2s ease;
}

/* 标题 */
h1 {
    font-size: 48px;
    color: #ff4d4d;
}

/* 按钮 */
button {
    margin: 10px;
    padding: 12px 24px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #007bff, #00c6ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #00c6ff;
}

/* 语言按钮 */
.lang {
    position: absolute;
    top: 20px;
    right: 20px;
}

/* 淡入动画 */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- 🎵 音乐 -->
<audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🌐 语言切换 -->
<div class="lang">
    <button onclick="setLang('zh')">中文</button>
    <button onclick="setLang('en')">English</button>
<div class="container">
  <div class="title">神爱你 ❤️</div>

  <div id="typing"></div>

  <div class="btn" onclick="enterSite()">进入 / Enter</div>
</div>
    <p id="verse">约翰福音 3:16</p>

    <p id="text">
        神爱世人，甚至将他的独生子赐给他们，
        叫一切信他的，不至灭亡，反得永生。
    </p>

    <br>

    <button onclick="goPage('story.html')" id="btn1">
        📖 阅读耶稣的故事
    </button>

    <button onclick="goPage('pray.html')" id="btn2">
        🙏 点击祷告
    </button>

    <br><br>

    <button onclick="playMusic()">🎵 播放音乐</button>
</div>

<script>
// 🌐 语言切换
function setLang(lang) {
    if (lang === 'zh') {
        title.innerText = "神爱你 ❤️";
        verse.innerText = "约翰福音 3:16";
        text.innerText = "神爱世人，甚至将他的独生子赐给他们，叫一切信他的，不至灭亡，反得永生。";
        btn1.innerText = "📖 阅读耶稣的故事";
        btn2.innerText = "🙏 点击祷告";
    }

    if (lang === 'en') {
        title.innerText = "God Loves You ❤️";
        verse.innerText = "John 3:16";
        text.innerText = "For God so loved the world that He gave His only Son, that whoever believes in Him shall not perish but have eternal life.";
        btn1.innerText = "📖 Read the Story of Jesus";
        btn2.innerText = "🙏 Pray";
    }
}

// 🎵 自动淡入音乐
window.addEventListener("click", () => {
    let audio = document.getElementById("bgm");
    audio.volume = 0;
    audio.play();

    let fade = setInterval(() => {
        if (audio.volume < 1) {
            audio.volume += 0.05;
        } else {
            clearInterval(fade);
        }
    }, 200);
}, { once: true });

// 🎵 手动播放
function playMusic() {
    let audio = document.getElementById("bgm");
    audio.play();
}

// 🔗 跳转页面（带淡出效果）
function goPage(page) {
    document.body.style.opacity = 0;
    setTimeout(() => {
        window.location.href = page;
    }, 500);
}
</script>

</body>
</html>
