<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>12门徒</title>
<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}
.card {
    border: 1px solid #444;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    background: #222;
    cursor: pointer;
}
.card:hover {
    background: #333;
}
</style>
</head>

<body>

<h1>耶稣的12门徒</h1>

<div class="card">彼得 Peter</div>
<div class="card">约翰 John</div>
<div class="card">雅各 James</div>
<div class="card">安得烈 Andrew</div>
<div class="card">腓力 Philip</div>
<div class="card">巴多罗买 Bartholomew</div>
<div class="card">马太 Matthew</div>
<div class="card">多马 Thomas</div>
<div class="card">雅各（亚勒腓之子）</div>
<div class="card">达太 Thaddaeus</div>
<div class="card">西门 Simon</div>
<div class="card">犹大 Judas</div>

</body>
</html>
