<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>God Loves You</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* 背景画面 */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('jesus.jpg') center/cover no-repeat;
  filter: brightness(0.25);
  transform: scale(1.1);
  animation: zoom 20s ease infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1.1); }
  to { transform: scale(1.2); }
}

/* 黑幕 */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  animation: fadeOut 2.5s ease forwards;
}

@keyframes fadeOut {
  to { opacity: 0; }
}

/* 光闪一下（电影感） */
.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  animation: flash 1s ease 1.5s;
}

@keyframes flash {
  0% { opacity: 0; }
  50% { opacity: 0.6; }
  100% { opacity: 0; }
}

/* 中心内容 */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* 主标题 */
.title {
  font-size: 60px;
  color: #ff4d4d;
  opacity: 0;
  transform: scale(0.8);
  animation: titleIn 2s ease 2s forwards;
}

@keyframes titleIn {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* 打字字幕 */
#typing {
  margin-top: 20px;
  font-size: 20px;
  color: #ddd;
  min-height: 30px;
}

/* 光标 */
#typing::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* 按钮 */
.btn {
  margin-top: 40px;
  padding: 15px 30px;
  background: #007bff;
  border-radius: 30px;
  cursor: pointer;
  opacity: 0;
  animation: fadeIn 2s ease 6s forwards;
}

.btn:hover {
  background: #0056b3;
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="flash"></div>

<div class="container">
  <div class="title">神爱你 ❤️</div>
  <div id="typing"></div>
  <div class="btn" onclick="enter()">进入 / Enter</div>
</div>

<!-- 🎵 音乐 -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// 🎬 打字机字幕
const text = [
  "你是否在寻找人生的意义？",
  "Are you searching for meaning in life?",
  "耶稣爱你 ❤️",
  "Jesus loves you"
];

let line = 0;
let char = 0;

function typeEffect() {
  if (line < text.length) {
    if (char < text[line].length) {
      document.getElementById("typing").innerHTML += text[line].charAt(char);
      char++;
      setTimeout(typeEffect, 40);
    } else {
      setTimeout(() => {
        document.getElementById("typing").innerHTML = "";
        char = 0;
        line++;
        typeEffect();
      }, 1500);
    }
  }
}

// 🎵 自动播放（需要用户触发）
document.body.addEventListener("click", () => {
  document.getElementById("music").play();
}, { once: true });

// 启动字幕（延迟更有电影感）
setTimeout(typeEffect, 2500);

// 进入页面
function enter() {
  window.location.href = "story.html";
}
</script>

</body>
</html>
