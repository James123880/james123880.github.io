<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>God Loves You</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('jesus.jpg') center/cover no-repeat;
  filter: brightness(0.4);
  animation: zoom 20s infinite alternate;
  z-index: -1;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.title {
  font-size: 50px;
  color: #ff4d4d;
  opacity: 0;
  animation: fadeIn 3s forwards 1s;
}

.subtitle {
  margin-top: 20px;
  opacity: 0;
  animation: fadeIn 3s forwards 3s;
}

.btn {
  margin-top: 40px;
  padding: 15px 30px;
  background: #007bff;
  border-radius: 30px;
  cursor: pointer;
  opacity: 0;
  animation: fadeIn 3s forwards 5s;
}

@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
  <div class="title">神爱你 ❤️</div>
  <div class="subtitle">God loves you</div>
  <div class="btn" onclick="go()">进入 / Enter</div>
</div>

<script>
function go() {
  window.location.href = "story.html";
}
</script>
<div style="position: fixed; top: 20px; left: 20px;">
  <button onclick="window.location.href='pray.html'">🙏 Prayer</button>
</div>
</button>
</body>
</html>
