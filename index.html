<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>十字架上的爱</title>

<style>
body {
  margin: 0;
  font-family: "Arial", sans-serif;
  height: 100vh;
  overflow: hidden;

  background: url('jesus.jpg') center/cover no-repeat;
}

/* 黑色电影遮罩 */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.7),
    rgba(0,0,0,0.9)
  );
}

/* 中心内容 */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
  max-width: 700px;
  padding: 20px;
}

/* 标题（发光） */
h1 {
  font-size: 50px;
  color: #ff4d4d;
  text-shadow: 0 0 20px rgba(255,0,0,0.8);
  animation: fadeUp 2s ease;
}

/* 副标题 */
.subtitle {
  margin-top: 10px;
  font-size: 22px;
  color: #ccc;
  animation: fadeUp 3s ease;
}

/* 经文 */
p {
  margin-top: 15px;
  line-height: 1.6;
  opacity: 0;
  animation: fadeUp 2s ease forwards;
}

p:nth-child(3) { animation-delay: 1s; }
p:nth-child(4) { animation-delay: 2s; }
p:nth-child(5) { animation-delay: 3s; }

/* 按钮 */
button {
  margin: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  color: white;
  background: linear-gradient(45deg, #007bff, #00c6ff);
  cursor: pointer;
  transition: 0.3s;
}

/* hover 发光 */
button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px rgba(0,123,255,0.8);
}

/* 音乐按钮 */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  font-size: 20px;
}

/* 动画 */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- 音乐 -->
<audio id="bgm" autoplay loop muted>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgm");

document.body.addEventListener('click', () => {
  music.muted = false;
  music.volume = 0;

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 100);

  music.play();
}, { once: true });
</script>

<!-- 内容 -->
<div class="container">
  <h1>神爱你 ❤️</h1>
  <div class="subtitle">约翰福音 3:16</div>

  <p>神爱世人，甚至将他的独生子赐给他们</p>
  <p>叫一切信他的，不至灭亡</p>
  <p>反得永生</p>

  <button onclick="location.href='story.html'">📖 阅读故事</button>
  <button onclick="location.href='pray.html'">🙏 点击祷告</button>
</div>

<!-- 音乐按钮 -->
<button class="music-btn" onclick="music.play()">🎵</button>

</audio>

<!-- 音乐按钮 -->
<button id="musicBtn" onclick="toggleMusic()" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  font-size: 22px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  cursor: pointer;
">
🔇
</button>

<script>
const music = document.getElementById("bgm");
const btn = document.getElementById("musicBtn");

// 第一次点击页面 → 自动开启音乐 + 淡入
document.body.addEventListener('click', () => {
  startMusic();
}, { once: true });

function startMusic() {
  music.muted = false;
  music.volume = 0;

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 100);

  music.play();
  btn.innerText = "🎵";
}

// 按钮控制开关
function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.innerText = "🎵";
  } else {
    music.pause();
    btn.innerText = "🔇";
  }<script>
if (localStorage.getItem("music") === "on") {
  startMusic();
}

function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.innerText = "🎵";
    localStorage.setItem("music", "on");
  } else {
    music.pause();
    btn.innerText = "🔇";
    localStorage.setItem("music", "off");
  }
}
</script>
}
</script>
</html>
