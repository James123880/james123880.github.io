<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>God Loves You</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  background: url('jesus.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.container {
  position: relative;
  text-align: center;
  color: white;
  max-width: 700px;
}

h1 {
  font-size: 50px;
  color: #ff4d4d;
}

.subtitle {
  font-size: 20px;
  color: #ccc;
}

button {
  margin: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #007bff;
  color: white;
  cursor: pointer;
}

/* 语言按钮 */
.lang {
  position: absolute;
  top: 20px;
  right: 20px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- 🌍 语言切换 -->
<div class="lang">
  <button onclick="setLang('zh')">中文</button>
  <button onclick="setLang('en')">English</button>
</div>

<!-- 内容 -->
<div class="container">
  <h1 id="title"></h1>
  <div class="subtitle" id="subtitle"></div>

  <p id="p1"></p>
  <p id="p2"></p>
  <p id="p3"></p>

  <button id="btn1"></button>
  <button id="btn2"></button>
</div>

<script>
function setLang(lang) {

  if (lang === 'zh') {
    document.getElementById("title").innerText = "神爱你 ❤️";
    document.getElementById("subtitle").innerText = "约翰福音 3:16";

    document.getElementById("p1").innerText = "神爱世人，甚至将他的独生子赐给他们";
    document.getElementById("p2").innerText = "叫一切信他的，不至灭亡";
    document.getElementById("p3").innerText = "反得永生";

    document.getElementById("btn1").innerText = "📖 阅读耶稣的故事";
    document.getElementById("btn2").innerText = "🙏 点击祷告";

  }

  if (lang === 'en') {
    document.getElementById("title").innerText = "God Loves You ❤️";
    document.getElementById("subtitle").innerText = "John 3:16";

    document.getElementById("p1").innerText = "For God so loved the world";
    document.getElementById("p2").innerText = "that He gave His only Son";
    document.getElementById("p3").innerText = "that whoever believes shall not perish but have eternal life";

    document.getElementById("btn1").innerText = "📖 Read the Story of Jesus";
    document.getElementById("btn2").innerText = "🙏 Pray Now";
  }
}

// English
setLang('en');
</script>

</body>
</html>
