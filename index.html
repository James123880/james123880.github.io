<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Jesus Film Opening</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

/* 背景 */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('jesus.jpg') center/cover no-repeat;
  opacity: 0;
  animation: fadeIn 3s forwards;
}

/* 黑色遮罩 */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
}

/* 中间内容 */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* 标题动画 */
.title {
  font-size: 48px;
  opacity: 0;
  letter-spacing: 5px;
  animation: titleFade 4s forwards;
}

.subtitle {
  margin-top: 20px;
  font-size: 20px;
  color: #ccc;
  opacity: 0;
  animation: titleFade 4s forwards 2s;
}

/* 按钮 */
.btn {
  margin-top: 40px;
  padding: 15px 40px;
  background: linear-gradient(45deg, #00c6ff, #007bff);
  border-radius: 50px;
  cursor: pointer;
  opacity: 0;
  animation: fadeIn 3s forwards 4s;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px rgba(0,123,255,0.8);
}

/* 动画 */
@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes titleFade {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
  <div class="title">耶稣的故事 ✝️</div>
  <div class="subtitle">Story of Jesus</div>
  <div class="btn" onclick="enter()">进入 / Enter</div>
<div class="btn" onclick="goPrayer()">🙏 主祷文 / Prayer</div>

<!-- 🎵 音乐 -->
<audio id="music" loop autoplay muted>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
// 🎵 点击后音乐渐入
let started = false;

function enter() {
  const music = document.getElementById("music");

  if (!started) {
    music.muted = false;
    music.volume = 0;
    music.play();

    let vol = 0;
    let fade = setInterval(() => {
      if (vol < 1) {
        vol += 0.02;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 100);

    started = true;
  }

  // 🎬 跳转下一页（延迟更有电影感）
  setTimeout(() => {
    window.location.href = "story.html";
  }, 1500);
}
</script>

</body>
</html>
