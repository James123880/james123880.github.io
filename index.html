<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>灵修首页 · Devotional Home</title>
<style>
  :root {
    --bg: #05070f;
    --text: #f6fbff;
    --accent: #7ed6ff;
    --card: rgba(8, 16, 38, 0.62);
    --card-border: rgba(126, 214, 255, 0.26);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    color: var(--text);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .cinematic-bg {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(130deg, rgba(0, 0, 0, 0.65), rgba(6, 18, 47, 0.78)),
      url("jesus.jpg") center/cover no-repeat;
    transform: scale(1.08);
    animation: kenburns 22s ease-in-out infinite alternate;
    z-index: -2;
  }

  .cinematic-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 20%, rgba(126, 214, 255, 0.32), transparent 40%);
    mix-blend-mode: screen;
  }

  @keyframes kenburns {
    from { transform: scale(1.08) translate(-1%, -1%); }
    to { transform: scale(1.18) translate(1%, 1%); }
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 9;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    backdrop-filter: blur(8px);
    background: rgba(4, 10, 24, 0.5);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .chip {
    border: 1px solid var(--card-border);
    background: rgba(12, 25, 57, 0.58);
    color: var(--text);
    border-radius: 999px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
  }

  .chip.active { box-shadow: 0 0 0 2px rgba(126,214,255,0.25); }

  .wrapper {
    max-width: 980px;
    margin: 0 auto;
    padding: 30px 18px 50px;
  }

  .hero {
    text-align: center;
    margin: 30px 0;
    padding: 34px 18px;
    border: 1px solid var(--card-border);
    border-radius: 24px;
    background: var(--card);
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }

  .hero h1 {
    margin: 0;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: 0.5px;
    text-shadow: 0 0 16px rgba(126,214,255,0.55);
  }

  .hero p {
    margin: 12px 0 0;
    opacity: 0.95;
    font-size: 1.05rem;
  }

  .grid {
    display: grid;
    gap: 18px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  }

  .card {
    border-radius: 18px;
    border: 1px solid var(--card-border);
    padding: 20px;
    background: var(--card);
  }

  .card h2 {
    margin: 0 0 14px;
    font-size: 1.25rem;
  }

  .verse-box {
    min-height: 170px;
    line-height: 1.8;
    font-size: 1rem;
  }

  .verse-ref {
    margin-top: 10px;
    color: #9ddfff;
    font-size: 0.92rem;
  }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    margin-top: 10px;
    cursor: pointer;
    font-weight: 600;
    color: #001127;
    background: linear-gradient(90deg, #7ed6ff, #b7f0ff);
  }

  .mode-on {
    box-shadow: 0 0 30px rgba(133, 238, 255, 0.45);
  }

  .small {
    opacity: 0.85;
    font-size: 0.92rem;
    margin-top: 8px;
  }

  .footer-link {
    display: inline-block;
    margin-top: 14px;
    color: #c2eeff;
    text-decoration: none;
    border-bottom: 1px dashed rgba(194, 238, 255, 0.5);
  }
</style>
</head>
<body>
<div class="cinematic-bg"></div>

<div class="topbar">
  <div id="brand">✝ 灵修空间</div>
  <div>
    <button class="chip active" id="langZh">中文</button>
    <button class="chip" id="langEn">EN</button>
  </div>
</div>

<div class="wrapper">
  <section class="hero">
    <h1 id="heroTitle">电影级灵修首页</h1>
    <p id="heroSub">安静心灵，进入敬拜，聆听神的话语。</p>
  </section>

  <section class="grid">
    <article class="card">
      <h2 id="bibleTitle">📖 圣经自动加载</h2>
      <div class="verse-box" id="verseText"></div>
      <div class="verse-ref" id="verseRef"></div>
      <button class="btn" id="nextVerseBtn">下一节</button>
      <div class="small" id="autoHint">系统每 8 秒自动切换经文</div>
    </article>

    <article class="card" id="worshipCard">
      <h2 id="musicTitle">🎵 敬拜音乐模式</h2>
      <p id="musicDesc">点击下方按钮，进入温柔背景敬拜音景。</p>
      <button class="btn" id="musicBtn">开启音乐模式</button>
      <div class="small" id="musicHint">提示：部分浏览器需要先点击后才可播放声音。</div>
    </article>

    <article class="card">
      <h2 id="prayerTitle">🙏 主祷文页面</h2>
      <p id="prayerDesc">可切换中英文的主祷文，适合个人或小组祷告。</p>
      <button class="btn" onclick="location.href='prayer.html'" id="goPrayerBtn">进入主祷文</button>
      <a class="footer-link" href="matthew.html" id="goMatthewLink">阅读：马太福音第 1 章</a>
      <br />
      <a class="footer-link" href="story.html" id="goApostlesLink">阅读：耶稣的十二门徒</a>
    </article>
  </section>
</div>

<script>
  const i18n = {
    zh: {
      brand: '✝ 灵修空间',
      heroTitle: '电影级灵修首页',
      heroSub: '安静心灵，进入敬拜，聆听神的话语。',
      bibleTitle: '📖 圣经自动加载',
      nextVerseBtn: '下一节',
      autoHint: '系统每 8 秒自动切换经文',
      musicTitle: '🎵 敬拜音乐模式',
      musicDesc: '点击下方按钮，进入温柔背景敬拜音景。',
      musicBtnOn: '开启音乐模式',
      musicBtnOff: '关闭音乐模式',
      musicHint: '提示：部分浏览器需要先点击后才可播放声音。',
      prayerTitle: '🙏 主祷文页面',
      prayerDesc: '可切换中英文的主祷文，适合个人或小组祷告。',
      goPrayerBtn: '进入主祷文',
      goMatthewLink: '阅读：马太福音第 1 章',
      goApostlesLink: '阅读：耶稣的十二门徒'
    },
    en: {
      brand: '✝ Devotional Space',
      heroTitle: 'Cinematic Devotional Home',
      heroSub: 'Be still, worship, and listen to God’s word.',
      bibleTitle: '📖 Auto Bible Loading',
      nextVerseBtn: 'Next Verse',
      autoHint: 'Verses rotate automatically every 8 seconds',
      musicTitle: '🎵 Worship Music Mode',
      musicDesc: 'Tap below to enter a gentle worship soundscape.',
      musicBtnOn: 'Start Music Mode',
      musicBtnOff: 'Stop Music Mode',
      musicHint: 'Tip: Browsers may require a click before audio can play.',
      prayerTitle: '🙏 Lord’s Prayer Page',
      prayerDesc: 'Open a bilingual Lord’s Prayer page for personal or group prayer.',
      goPrayerBtn: 'Open Prayer Page',
      goMatthewLink: 'Read: Matthew Chapter 1',
      goApostlesLink: 'Read: The 12 Apostles'
    }
  };

  const verses = [
    {
      ref: { zh: '诗篇 Psalm 46:10', en: 'Psalm 46:10' },
      zh: '你们要休息，要知道我是神。',
      en: 'Be still, and know that I am God.'
    },
    {
      ref: { zh: '马太福音 Matthew 11:28', en: 'Matthew 11:28' },
      zh: '凡劳苦担重担的人，可以到我这里来，我就使你们得安息。',
      en: 'Come to me, all who labor and are heavy laden, and I will give you rest.'
    },
    {
      ref: { zh: '约翰福音 John 14:27', en: 'John 14:27' },
      zh: '我留下平安给你们；我将我的平安赐给你们。',
      en: 'Peace I leave with you; my peace I give to you.'
    },
    {
      ref: { zh: '腓立比书 Philippians 4:6-7', en: 'Philippians 4:6-7' },
      zh: '应当一无挂虑，只要凡事借着祷告、祈求和感谢，将你们所要的告诉神。神所赐出人意外的平安，必在基督耶稣里保守你们的心怀意念。',
      en: 'Do not be anxious about anything, but in everything by prayer and supplication with thanksgiving let your requests be made known to God...'
    }
  ];

  let lang = 'zh';
  let verseIndex = 0;
  let rotateTimer;

  const verseTextEl = document.getElementById('verseText');
  const verseRefEl = document.getElementById('verseRef');
  const musicBtn = document.getElementById('musicBtn');
  const worshipCard = document.getElementById('worshipCard');

  function applyLang() {
    const t = i18n[lang];
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.getElementById('brand').textContent = t.brand;
    document.getElementById('heroTitle').textContent = t.heroTitle;
    document.getElementById('heroSub').textContent = t.heroSub;
    document.getElementById('bibleTitle').textContent = t.bibleTitle;
    document.getElementById('nextVerseBtn').textContent = t.nextVerseBtn;
    document.getElementById('autoHint').textContent = t.autoHint;
    document.getElementById('musicTitle').textContent = t.musicTitle;
    document.getElementById('musicDesc').textContent = t.musicDesc;
    document.getElementById('musicHint').textContent = t.musicHint;
    document.getElementById('prayerTitle').textContent = t.prayerTitle;
    document.getElementById('prayerDesc').textContent = t.prayerDesc;
    document.getElementById('goPrayerBtn').textContent = t.goPrayerBtn;
    document.getElementById('goMatthewLink').textContent = t.goMatthewLink;
    document.getElementById('goApostlesLink').textContent = t.goApostlesLink;
    musicBtn.textContent = worshipOn ? t.musicBtnOff : t.musicBtnOn;
    renderVerse();
  }

  function renderVerse() {
    const verse = verses[verseIndex];
    verseTextEl.textContent = verse[lang];
    verseRefEl.textContent = verse.ref[lang];
  }

  function nextVerse() {
    verseIndex = (verseIndex + 1) % verses.length;
    renderVerse();
  }

  document.getElementById('nextVerseBtn').addEventListener('click', nextVerse);

  function startAutoRotate() {
    clearInterval(rotateTimer);
    rotateTimer = setInterval(nextVerse, 8000);
  }

  document.getElementById('langZh').addEventListener('click', () => {
    lang = 'zh';
    document.getElementById('langZh').classList.add('active');
    document.getElementById('langEn').classList.remove('active');
    applyLang();
  });

  document.getElementById('langEn').addEventListener('click', () => {
    lang = 'en';
    document.getElementById('langEn').classList.add('active');
    document.getElementById('langZh').classList.remove('active');
    applyLang();
  });

  let audioCtx;
  let masterGain;
  let oscillators = [];
  let worshipOn = false;

  function chord(frequencies) {
    const gain = audioCtx.createGain();
    gain.gain.value = 0.06;
    gain.connect(masterGain);

    const nodes = frequencies.map(freq => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.connect(gain);
      osc.start();
      return osc;
    });

    return { gain, nodes };
  }

  function startWorshipMusic() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.0001;
    masterGain.connect(audioCtx.destination);

    const progression = [
      [261.63, 329.63, 392.0],
      [220.0, 277.18, 329.63],
      [196.0, 246.94, 293.66],
      [174.61, 220.0, 261.63]
    ];

    let step = 0;
    const layer = () => {
      const { gain, nodes } = chord(progression[step % progression.length]);
      oscillators.push(...nodes);
      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 1.5);
      gain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 6.5);
      setTimeout(() => {
        nodes.forEach(n => n.stop());
      }, 7000);
      step++;
      if (worshipOn) setTimeout(layer, 3500);
    };

    masterGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 1);
    layer();
  }

  async function stopWorshipMusic() {
    if (!audioCtx) return;
    masterGain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
    setTimeout(async () => {
      try { await audioCtx.close(); } catch (e) {}
      audioCtx = null;
      oscillators = [];
    }, 700);
  }

  musicBtn.addEventListener('click', async () => {
    worshipOn = !worshipOn;
    worshipCard.classList.toggle('mode-on', worshipOn);

    if (worshipOn) {
      startWorshipMusic();
    } else {
      await stopWorshipMusic();
    }
    applyLang();
  });

  applyLang();
  renderVerse();
  startAutoRotate();
</script>
</body>
</html>
