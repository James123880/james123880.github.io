<!DOCTYPE html>
<html lang="zh">
<head><audio id="bgm" autoplay loop muted>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgm");

// 用户第一次点击页面 → 开启声音 + 淡入
document.body.addEventListener('click', () => {
  music.muted = false;
  music.volume = 0;

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 100);

  music.play();
}, { once: true });
</script>
