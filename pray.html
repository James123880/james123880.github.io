<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Story of Jesus</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('jesus.jpg') center/cover no-repeat;
  filter: brightness(0.3) blur(3px);
  z-index: -1;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 100px 20px;
}

h1 {
  text-align: center;
  color: #ff4d4d;
}

.block {
  margin: 40px 0;
  opacity: 0;
  transform: translateY(50px);
  transition: 1s;
}

.block.show {
  opacity: 1;
  transform: translateY(0);
}

.zh { font-size: 18px; }
.en { font-size: 16px; color: #ccc; }

.lang {
  position: fixed;
  top: 20px;
  right: 20px;
}

button {
  padding: 8px 15px;
  margin: 5px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 10px;
}

/* 打字机 */
#typing {
  margin-top: 30px;
  font-size: 20px;
  color: #ddd;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="lang">
  <button onclick="setLang('zh')">中文</button>
  <button onclick="setLang('en')">English</button>
</div>

<div class="container">

<h1 id="title">耶稣的故事 ✝️</h1>

<div class="block">
  <div class="zh">耶稣出生在伯利恒，这是一个谦卑的开始。</div>
  <div class="en">Jesus was born in Bethlehem, a humble beginning.</div>
</div>

<div class="block">
  <div class="zh">他成长于拿撒勒，过着普通生活。</div>
  <div class="en">He grew up in Nazareth.</div>
</div>

<div class="block">
  <div class="zh">他教导爱、医治人。</div>
  <div class="en">He taught love and healed people.</div>
</div>

<div class="block">
  <div class="zh">他为世人的罪被钉十字架。</div>
  <div class="en">He died on the cross for us.</div>
</div>

<div class="block">
  <div class="zh">三天后复活。</div>
  <div class="en">He rose again.</div>
</div>

<div id="typing"></div>

</div>

<!-- 🎵 音乐 -->
<audio id="bgm" src="music.mp3" loop></audio>

<script>
/* 滚动动画 */
const blocks = document.querySelectorAll('.block');
window.addEventListener('scroll', () => {
  blocks.forEach(b => {
    if (b.getBoundingClientRect().top < window.innerHeight - 50) {
      b.classList.add('show');
    }
  });
});

/* 初始触发 */
window.dispatchEvent(new Event('scroll'));

/* 语言切换 */
function setLang(lang) {
  document.querySelectorAll('.zh').forEach(el => {
    el.style.display = (lang==='zh')?'block':'none';
  });
  document.querySelectorAll('.en').forEach(el => {
    el.style.display = (lang==='en')?'block':'none';
  });
}
setLang('zh');

/* 🎬 打字机 */
let text = "Jesus loves you...";
let i = 0;
function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 80);
  }
}
typing();

/* 🎵 自动音乐（点击后播放） */
document.body.addEventListener('click', () => {
  document.getElementById("bgm").play();
}, { once: true });
</script>

</body>
</html>
